name: Deploy Client to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Validate required frontend env
        env:
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.VITE_SPOTIFY_CLIENT_ID || vars.VITE_SPOTIFY_CLIENT_ID }}
          VITE_REDIRECT_URI: ${{ secrets.VITE_REDIRECT_URI || vars.VITE_REDIRECT_URI }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL || vars.VITE_SERVER_URL }}
        run: |
          if [ -z "$VITE_SPOTIFY_CLIENT_ID" ]; then
            echo "Missing VITE_SPOTIFY_CLIENT_ID in repository Secrets/Variables"
            exit 1
          fi
          if [ -z "$VITE_REDIRECT_URI" ]; then
            echo "Missing VITE_REDIRECT_URI in repository Secrets/Variables"
            exit 1
          fi
          if [ -z "$VITE_SERVER_URL" ]; then
            echo "Missing VITE_SERVER_URL in repository Secrets/Variables"
            exit 1
          fi

      - name: Build client
        run: npm run build --prefix client
        env:
          VITE_BASE_PATH: /Musinary/
          VITE_SPOTIFY_CLIENT_ID: ${{ secrets.VITE_SPOTIFY_CLIENT_ID || vars.VITE_SPOTIFY_CLIENT_ID }}
          VITE_REDIRECT_URI: ${{ secrets.VITE_REDIRECT_URI || vars.VITE_REDIRECT_URI }}
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL || vars.VITE_SERVER_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
